<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-L55T6FTWDE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-L55T6FTWDE');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>404 – Page Not Found | Netanel Tours VIP</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #f5f5f7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .container {
            max-width: 560px;
            width: 100%;
        }
        .code {
            font-size: 96px;
            font-weight: 700;
            letter-spacing: -4px;
            color: #f0b429;
            line-height: 1;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #f5f5f7;
        }
        p {
            font-size: 16px;
            color: #a0aec0;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background-color: #f0b429;
            color: #1a1a1a;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: background-color 0.25s, transform 0.15s;
        }
        .btn:hover {
            background-color: #d4a017;
            transform: translateY(-1px);
        }
        .redirect-notice {
            margin-top: 24px;
            font-size: 13px;
            color: #718096;
        }
        #countdown {
            font-weight: 700;
            color: #f0b429;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved.<br>
           Let us take you back home.</p>
        <a class="btn" href="/">Back to Home</a>
        <p class="redirect-notice">Redirecting automatically in <span id="countdown" aria-live="polite">10</span> seconds…</p>
    </div>
    <script>
      let sec = 10;
      const el = document.getElementById('countdown');
      const timer = setInterval(function () {
        sec--;
        if (el) el.textContent = sec;
        if (sec <= 0) {
          clearInterval(timer);
          window.location.href = '/';
        }
      }, 1000);
    </script>
</body>
</html>
